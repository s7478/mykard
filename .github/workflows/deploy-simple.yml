name: Simple Deploy to AWS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to EC2
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > deploy_key
          chmod 600 deploy_key
          ssh -o StrictHostKeyChecking=no -i deploy_key ubuntu@${{ secrets.EC2_IP }} << 'EOF'
            cd ~/CredLink
            git pull origin main
            
            # Install dependencies
            npm install
            
            # Generate Prisma client
            npx prisma generate
            
            # Build the application
            npm run build
            
            # Restart PM2 processes with updated environment
            pm2 restart all --update-env
          EOF
          rm deploy_key
