# ============================================
# CREDLINK CLOUD BUILD CONFIGURATION
# ============================================
# Automated build and deploy to Google Cloud Run

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/credlink:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/credlink:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyBCt_QhVfDJiuG6GXbI9_lqBHa3hDsmDV4'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=credlink-01.firebaseapp.com'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=credlink-01'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=credlink-01.firebasestorage.app'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=226902678503'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=1:226902678503:web:9847fb640dcc04f419fb42'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=G-58H2TTCVWH'
      - '--build-arg'
      - 'NEXT_PUBLIC_APP_URL=https://credlink-226902678503.asia-south1.run.app'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/credlink:latest'
      - '.'
  
  # Step 2: Push image with commit SHA tag
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-sha'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/credlink:$COMMIT_SHA'
    waitFor: ['build-image']
  
  # Step 3: Push image with latest tag
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-latest'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/credlink:latest'
    waitFor: ['build-image']
  
  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'credlink'
      - '--image'
      - 'gcr.io/$PROJECT_ID/credlink:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--timeout'
      - '300s'
      - '--concurrency'
      - '80'
      - '--set-env-vars'
      - 'NODE_ENV=production,HOSTNAME=0.0.0.0,NEXT_TELEMETRY_DISABLED=1,FIREBASE_PROJECT_ID=credlink-01,FIREBASE_STORAGE_BUCKET=credlink-01.firebasestorage.app,FIREBASE_API_KEY=AIzaSyBCt_QhVfDJiuG6GXbI9_lqBHa3hDsmDV4,FIREBASE_AUTH_DOMAIN=credlink-01.firebaseapp.com,FIREBASE_MESSAGING_SENDER_ID=226902678503,FIREBASE_APP_ID=1:226902678503:web:9847fb640dcc04f419fb42,FIREBASE_MEASUREMENT_ID=G-58H2TTCVWH,NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyBCt_QhVfDJiuG6GXbI9_lqBHa3hDsmDV4,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=credlink-01.firebaseapp.com,NEXT_PUBLIC_FIREBASE_PROJECT_ID=credlink-01,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=credlink-01.firebasestorage.app,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=226902678503,NEXT_PUBLIC_FIREBASE_APP_ID=1:226902678503:web:9847fb640dcc04f419fb42,NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=G-58H2TTCVWH,NEXT_PUBLIC_APP_URL=https://mykard.in,NEXTAUTH_URL=https://mykard.in'
      - '--update-secrets'
      - 'DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,NEXTAUTH_SECRET=NEXTAUTH_SECRET:latest,FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest,FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest,CLOUDINARY_URL=CLOUDINARY_URL:latest'
    waitFor: ['push-sha', 'push-latest']

# Build configuration
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  dynamicSubstitutions: true

# Images to store
images:
  - 'gcr.io/$PROJECT_ID/credlink:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/credlink:latest'

# Timeout for build (20 minutes)
timeout: '1200s'
