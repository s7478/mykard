steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/credlink:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/credlink:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyBCt_QhVfDJiuG6GXbI9_lqBHa3hDsmDV4'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=credlink-01.firebaseapp.com'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=credlink-01'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=credlink-01.firebasestorage.app'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=226902678503'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=1:226902678503:web:9847fb640dcc04f419fb42'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=G-58H2TTCVWH'
      - '.'
  
  # Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/credlink:$COMMIT_SHA'
  
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/credlink:latest'
  
  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'credlink'
      - '--image'
      - 'gcr.io/$PROJECT_ID/credlink:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'DATABASE_URL=$$DATABASE_URL,JWT_SECRET=$$JWT_SECRET,FIREBASE_PROJECT_ID=credlink-01,FIREBASE_CLIENT_EMAIL=$$FIREBASE_CLIENT_EMAIL,FIREBASE_PRIVATE_KEY=$$FIREBASE_PRIVATE_KEY,CLOUDINARY_URL=$$CLOUDINARY_URL,NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyBCt_QhVfDJiuG6GXbI9_lqBHa3hDsmDV4,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=credlink-01.firebaseapp.com,NEXT_PUBLIC_FIREBASE_PROJECT_ID=credlink-01,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=credlink-01.firebasestorage.app,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=226902678503,NEXT_PUBLIC_FIREBASE_APP_ID=1:226902678503:web:9847fb640dcc04f419fb42,NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=G-58H2TTCVWH,FIREBASE_STORAGE_BUCKET=credlink-01.firebasestorage.app'

# Store secrets in Google Cloud Secret Manager and reference them
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DATABASE_URL/versions/latest
      env: 'DATABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/JWT_SECRET/versions/latest
      env: 'JWT_SECRET'
    - versionName: projects/$PROJECT_ID/secrets/FIREBASE_CLIENT_EMAIL/versions/latest
      env: 'FIREBASE_CLIENT_EMAIL'
    - versionName: projects/$PROJECT_ID/secrets/FIREBASE_PRIVATE_KEY/versions/latest
      env: 'FIREBASE_PRIVATE_KEY'
    - versionName: projects/$PROJECT_ID/secrets/CLOUDINARY_URL/versions/latest
      env: 'CLOUDINARY_URL'

options:
  machineType: 'E2_HIGHCPU_8'
  
images:
  - 'gcr.io/$PROJECT_ID/credlink:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/credlink:latest'
